name: Governance Checks

on:
  pull_request:
  push:
    branches:
      - main
      - rmlUI
      - codex/rmlui-ui-split
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-docs:
    name: Workflow Docs
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check workflow documents
        run: python qmclient_scripts/gate/check_workflow_docs.py

      - name: Generate gate report fixture
        shell: bash
        run: |
          mkdir -p tmp
          bash qmclient_scripts/gate/check-gate.sh \
            --mode quick \
            --base-ref HEAD \
            --skip-preflight \
            --skip-config-checks \
            --skip-header-checks \
            --skip-style-check \
            --report-json-path tmp/check-gate-fixture.json

      - name: Generate release notes smoke draft
        run: python qmclient_scripts/generate_release_notes.py --version CI --gate-report tmp/check-gate-fixture.json --output tmp/release-notes-ci.md

      - name: Upload release notes smoke draft
        uses: actions/upload-artifact@v4
        with:
          name: governance-release-notes-smoke
          path: tmp/release-notes-ci.md
          if-no-files-found: error
          retention-days: 7

  quick-gate-windows:
    name: Quick Gate (Windows)
    runs-on: windows-2022
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LLVM clang-format
        shell: pwsh
        run: choco install llvm -y --no-progress

      - name: Fetch main baseline
        shell: pwsh
        run: git fetch origin main --depth=1

      - name: Run quick governance gate
        shell: bash
        run: |
          mkdir -p tmp
          bash qmclient_scripts/gate/check-gate.sh \
            --mode quick \
            --base-ref origin/main \
            --report-json-path tmp/check-gate-ci.json \
            --explain-scope \
            --scope-report-path tmp/check-gate-ci-scope.json 2>&1 | tee tmp/check-gate-ci.log

      - name: Refresh baseline allowlist dry-run
        shell: pwsh
        run: python qmclient_scripts/gate/refresh_baseline_debt_allowlist.py --report tmp\check-gate-ci.json --output qmclient_scripts/gate/baseline_debt_allowlist.json --dry-run

      - name: Upload quick gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-check-gate-report
          path: tmp/check-gate-ci.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload quick gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-check-gate-log
          path: tmp/check-gate-ci.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload quick gate scope report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-check-gate-scope
          path: tmp/check-gate-ci-scope.json
          if-no-files-found: error
          retention-days: 7

  default-gate-windows:
    name: Default Gate (Windows)
    runs-on: windows-2022
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LLVM clang-format
        shell: pwsh
        run: choco install llvm -y --no-progress

      - name: Fetch main baseline
        shell: pwsh
        run: git fetch origin main --depth=1

      - name: Run default governance gate
        shell: bash
        run: |
          mkdir -p tmp
          bash qmclient_scripts/gate/check-gate.sh \
            --mode default \
            --base-ref origin/main \
            --report-json-path tmp/check-gate-default-ci.json \
            --explain-scope \
            --scope-report-path tmp/check-gate-default-ci-scope.json 2>&1 | tee tmp/check-gate-default-ci.log

      - name: Upload default gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-check-gate-default-report
          path: tmp/check-gate-default-ci.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload default gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-check-gate-default-log
          path: tmp/check-gate-default-ci.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload default gate scope report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-check-gate-default-scope
          path: tmp/check-gate-default-ci-scope.json
          if-no-files-found: error
          retention-days: 7
