name: Check style

on:
  push:
    branches-ignore:
      - gh-readonly-queue/**
  pull_request:
  merge_group:

jobs:
  check-style:
    runs-on: ubuntu-latest
    env:
      CARGO_HTTP_MULTIPLEXING: false
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Prepare Linux
      run: |
        sudo apt-get update -y
        sudo apt-get install ddnet-tools shellcheck tidy pkg-config cmake graphviz ninja-build python3-clang python3-pil wget gnupg ca-certificates -y
        wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor | sudo tee /usr/share/keyrings/apt.llvm.org.gpg >/dev/null
        echo "deb [signed-by=/usr/share/keyrings/apt.llvm.org.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm-toolchain-noble-22.list >/dev/null
        sudo apt-get update -y
        sudo apt-get install clang-format-22 -y
        pip3 install ruff

    - name: Run gate check (quick)
      run: |
        python3 qmclient_scripts/gate/check_gate.py --mode quick --ci-mode --report-json-path tmp/check-gate-report.json

    - name: Build dilate tool
      run: |
        mkdir -p release
        cd release
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCLIENT=OFF -DDOWNLOAD_GTEST=OFF ..
        cmake --build . --config Release --target dilate

    - name: Write CI summary
      if: always()
      run: |
        python3 qmclient_scripts/gate/tools/ci_summary.py \
          --kind style \
          --status "${{ job.status }}" \
          --report tmp/check-gate-report.json \
          --output "$GITHUB_STEP_SUMMARY"
      shell: bash
    - name: Check dilated images
      run: scripts/check_dilate.py release data

    - name: Upload gate report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gate-report-style
        path: tmp/check-gate-report.json
        retention-days: 7
        overwrite: true
        if-no-files-found: ignore
