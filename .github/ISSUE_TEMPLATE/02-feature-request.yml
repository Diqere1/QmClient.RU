name: Feature 请求
description: 提出新功能建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰描述你希望新增的功能
      placeholder: "例如：希望在客户端中增加一个快速切换服务器分组的功能"
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: 使用场景 / 解决的问题
      description: 描述这个功能能解决什么问题，或在什么场景下会用到
      placeholder: |
        例如：
        - 当前问题：每次切换服务器分组需要多次点击，操作繁琐
        - 使用场景：经常在「国服」和「外服」之间切换，希望一键切换
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的实现方式
      description: 你希望这个功能如何实现？（可选）
      placeholder: |
        例如：
        - 在服务器列表顶部增加分组切换下拉菜单
        - 支持快捷键快速切换（如 Ctrl+1、Ctrl+2）
        - 记住上次选择的分组，下次启动自动切换

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他相关信息，如参考设计、类似功能在其他客户端的实现等（可选）
      placeholder: "例如：某客户端已有类似功能，截图链接：..."