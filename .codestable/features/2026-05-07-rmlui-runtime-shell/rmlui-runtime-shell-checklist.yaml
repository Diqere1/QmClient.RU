feature: 2026-05-07-rmlui-runtime-shell
created: 2026-05-07

steps:
  - action: "TDD 基线：为全局关闭、模块关闭、runtime 不可用三条路径建立失败测试"
    exit_signal: "新增测试在实现前失败，且失败原因分别对应全局关闭、模块关闭、runtime 不可用"
    status: done
  - action: "编排骨架：建立 runtime shell、module descriptor、layer-first frame request/result 和 diagnostics 类型"
    exit_signal: "测试或日志能区分 SKIPPED_DISABLED、FALLBACK_REQUIRED、RENDERED 三种结果"
    status: done
  - action: "试点模块注册：让 monitoring_hud 作为 GAME_HUD prototype host 注册到 runtime"
    exit_signal: "重复注册不会产生两个有效模块，fallback owner 保持为 CGameClient::RenderQmMonitoringHud"
    status: done
  - action: "宿主接入：让 RenderQmMonitoringHud 消费 runtime frame result 并继续执行旧 HUD fallback"
    exit_signal: "关闭全局或模块开关时旧 HUD 正常显示，相关失败测试转绿"
    status: done
  - action: "诊断导出：输出结构化 runtime diagnostics 到保存目录下的 dumps/QmClient_Crash"
    exit_signal: "一次 runtime 或 surface 失败能生成包含 module、layer、failure、fallback owner 和运行时间的诊断文件"
    status: done
  - action: "收尾整理：对齐 qm_ 配置命名、清理被替代的 surface 特例诊断路径并保持测试通过"
    exit_signal: "相关测试继续通过，design 中声明的配置命名和诊断字段全部对齐"
    status: done

checks:
  - item: "RmlUI runtime 只负责判定和报告，不直接绘制旧 fallback"
    source: 流程级约束
    status: passed
  - item: "module descriptor 包含 module name、toggle、layer、document、input requirement、fallback owner"
    source: 名词契约
    status: passed
  - item: "Monitoring HUD 只能作为 GAME_HUD prototype host，不被视为稳定可复用模板"
    source: 名词契约
    status: passed
  - item: "RenderRmlUiLayer(GAME_HUD) 能返回 SKIPPED_DISABLED、FALLBACK_REQUIRED、RENDERED"
    source: 编排骨架
    status: passed
  - item: "全局开关关闭时不初始化 RmlUI core，并回到旧 HUD"
    source: 验收场景
    status: passed
  - item: "模块开关关闭时 runtime 返回 SKIPPED_DISABLED，并回到旧 HUD"
    source: 验收场景
    status: passed
  - item: "backend/core 初始化失败时 runtime 返回 FALLBACK_REQUIRED，并可导出结构化诊断"
    source: 验收场景
    status: passed
  - item: "Monitoring HUD 试点内部失败时旧 HUD fallback 生效，且 failure reason 能区分 runtime/backend 与 surface/document"
    source: 验收场景
    status: passed
  - item: "重复注册 monitoring_hud 不会产生两个有效模块"
    source: 验收场景
    status: passed
  - item: "诊断文件位于 dumps/QmClient_Crash，文件名包含模块名和运行时间"
    source: 验收场景
    status: passed
  - item: "不新增 SDL_GL_MakeCurrent 或 SDL_GL_GetCurrentContext 使用点来支持 runtime shell"
    source: 范围守护
    status: passed
  - item: "不修改 Monitoring HUD 图表算法、RCSS 视觉细节、菜单、弹窗、设置页、轮盘或 HUD 编辑器"
    source: 范围守护
    status: passed
  - item: "不删除旧 HUD fallback，不把 RenderInterface_GL3 声明为长期正式方案"
    source: 范围守护
    status: passed
