feature: 2026-05-07-rmlui-resource-diagnostics
created: 2026-05-07

steps:
  - action: "TDD baseline：先补 missing document、missing required font、missing optional icon font、repeated identical failure 四类失败测试"
    exit_signal: "改代码前测试先失败，且能区分 fatal 与 diagnostic-only 资源错误"
    status: done
  - action: "Schema baseline：定义 resource diagnostic event 字段、稳定 error_code、fatal/optional 分类"
    exit_signal: "测试能构造 document_missing、font_missing、rcss_parse_error 三类事件，并带 fatal 标记"
    status: done
  - action: "Capture points：从当前 RmlUI prototype 路径捕获 document/font/style/file 失败"
    exit_signal: "缺失 RML、缺失 required font、缺失 optional icon font 能生成不同的结构化 resource diagnostic event"
    status: done
  - action: "Exporter：把 diagnostic bundle 写入 dumps/QmClient_Crash"
    exit_signal: "导出文件名包含 module、timestamp、result，文件字段完整，resource_path 保持 storage-relative"
    status: done
  - action: "Export gate + throttling：仅在开发诊断开启时导出，并去重同一 failure tuple"
    exit_signal: "重复失败不按帧写文件；未开启 debug diagnostics 时不落盘"
    status: done
  - action: "Runtime integration：把 resource diagnostics 附着到 runtime-shell frame result"
    exit_signal: "runtime/backend failure 与 document/font/style failure 在诊断中可区分"
    status: done

checks:
  - item: "resource diagnostics event 包含 schema、category、module、stage、layer、result"
    source: 名词契约
    status: passed
  - item: "resource_type 支持 rml、rcss、font、image、texture、file"
    source: 名词契约
    status: passed
  - item: "error_code 至少覆盖 document_missing、font_missing、rcss_parse_error、texture_load_failed、file_open_failed"
    source: 名词契约
    status: passed
  - item: "resource_path 输出 storage-relative 路径，不泄露绝对 OS 路径"
    source: 诊断约束
    status: passed
  - item: "缺失 Monitoring HUD RML 产生 resource_type=rml 的结构化诊断"
    source: 验收场景
    status: passed
  - item: "缺失 required 字体产生 resource_type=font 的结构化诊断，并可触发 fallback"
    source: 验收场景
    status: passed
  - item: "缺失 optional icon font 产生 resource_type=font 的结构化诊断，但不会自动触发 fallback"
    source: 验收场景
    status: passed
  - item: "RCSS parse warning 或 unsupported property 可归类为 resource_type=rcss"
    source: 验收场景
    status: passed
  - item: "诊断导出目录是 dumps/QmClient_Crash 而不是仓库根目录 log/"
    source: 挂载点
    status: passed
  - item: "只有开发诊断明确开启时才导出文件，默认路径不做每帧自动落盘"
    source: 流程级约束
    status: passed
  - item: "runtime/backend failure 与 resource failure 在同一 bundle 中仍保持不同字段"
    source: 分层约束
    status: passed
  - item: "不修复 Monitoring HUD 图表、布局、RCSS 视觉和 render bridge texture 上传"
    source: 范围守护
    status: passed
