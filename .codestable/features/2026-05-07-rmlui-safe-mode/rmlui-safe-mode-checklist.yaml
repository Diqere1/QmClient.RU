feature: 2026-05-07-rmlui-safe-mode
created: 2026-05-07

steps:
  - action: "TDD baseline：先补 repeated FALLBACK_REQUIRED、disabled 不计数、success/reset 三类失败测试"
    exit_signal: "改代码前测试先失败，且失败原因对应 safe-mode 规则"
    status: done
  - action: "Failure streak model：在 CRmlUiRuntime 里统计同一 module 的连续 FALLBACK_REQUIRED 次数"
    exit_signal: "测试能模拟 1->2->3 的 streak 增长，且状态结构能读出 consecutive count、session demoted、last trip/reset reason"
    status: done
  - action: "Threshold decision：第 3 次连续失败触发 safe_mode_trip，并把模块标记为 session demoted"
    exit_signal: "触发帧返回 FALLBACK_REQUIRED reason=safe_mode_trip，后续帧返回 SKIPPED_UNAVAILABLE reason=safe_mode_session_disabled，且原始触发原因仍可从 diagnostics 读取"
    status: done
  - action: "Host integration：runtime 结果反映 safe-mode 触发后的 fallback 决策"
    exit_signal: "host 仍会走 legacy fallback，且能区分触发帧与已 demoted 帧，不把 streak/demotion 状态下沉到 host"
    status: done
  - action: "Diagnostics：输出 safe-mode 决策与触发原因"
    exit_signal: "诊断文件/日志可解释 failure_count、threshold、host-visible reason、trigger reason、session demoted、reset reason"
    status: done
  - action: "Recovery：实现 success render、模块 toggle cycle、qm_rmlui_safe_mode toggle cycle 三类 reset"
    exit_signal: "reset 后模块恢复可用并能再次尝试，且测试覆盖 render success reset、module toggle reset、qm_rmlui_safe_mode toggle reset"
    status: done

checks:
  - item: "safe mode 是全局护栏，不替代 runtime fallback"
    source: 流程级约束
    status: passed
  - item: "failure streak 只统计 enabled module 的连续 FALLBACK_REQUIRED，不统计 SKIPPED_DISABLED"
    source: 名词契约
    status: passed
  - item: "failure streak 可被计数、读取和重置"
    source: 名词契约
    status: passed
  - item: "超过阈值后当前帧返回 safe_mode_trip，后续帧进入 session demoted"
    source: 验收场景
    status: passed
  - item: "legacy fallback 仍可立即执行"
    source: 范围守护
    status: passed
  - item: "diagnostics 解释 threshold、failure_count、trip reason、reset reason"
    source: 验收场景
    status: passed
  - item: "safe_mode_trip 与 safe_mode_session_disabled 的 host-visible reason 与 triggering failure reason 不混淆"
    source: 验收场景
    status: passed
  - item: "safe-mode 状态由 CRmlUiRuntime 持有，不下沉到 backend 或 surface"
    source: 分层约束
    status: passed
  - item: "不修改 Monitoring HUD 视觉或 render bridge 行为"
    source: 范围守护
