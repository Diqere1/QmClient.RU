feature: 2026-05-08-rmlui-popup-migration
created: 2026-05-08

steps:
  - action: "弹窗契约：定义可迁移弹窗集合、view model 和 action token"
    exit_signal: "能稳定区分可迁移 fullscreen popup 与非迁移 popup，并明确 RmlUI 只回传语义动作，不直接持有业务 callback"
    status: done
  - action: "弹窗模块：实现 popup modal document、结构校验和 pending action controller"
    exit_signal: "RmlUI popup 模块可独立渲染 message/confirm/warning/disconnected/quit/restart 这组低风险弹窗，并对外输出稳定 action token"
    status: done
  - action: "宿主接线：把 RenderPopupFullscreen 的低风险弹窗接到 popup module，其余 fullscreen popup 保持 legacy"
    exit_signal: "fullscreen popup host 能按 popup kind 选择 RmlUI 或 legacy，且原有 callback / next popup 语义不被改写"
    status: done
  - action: "输入与回退：接 active predicate、fallback owner、cancel/release-state 和 safe-mode"
    exit_signal: "迁移后的弹窗只在真正 active 时消费输入，失败时可同帧回退旧弹窗，不残留 pressed/hover/text-input 状态"
    status: done
  - action: "验证闭环：补 targeted tests、构建验证和人工验收清单"
    exit_signal: "自动证据能覆盖 popup 输入消费、action 映射、非迁移 popup 守护与 fallback；人工验收只负责最终 UI 表现确认"
    status: done

checks:
  - item: "仅迁移低风险 fullscreen popup，不把 popup_menu 或文本输入型 popup 一起带入"
    source: 范围守护
    status: passed
  - item: "popup module 自己解释按钮/热键语义，runtime-shell 不解析 DOM 事件参数"
    source: 名词契约
    status: passed
  - item: "可迁移 popup 的 active predicate 必须同时满足全局开关、模块开关、menus active 和 popup kind 命中"
    source: 编排骨架
    status: passed
  - item: "迁移后确认/取消动作仍复用现有 CMenus callback / next popup 语义"
    source: 编排骨架
    status: passed
  - item: "Escape / Enter 的 modal 行为与当前 legacy popup 语义保持一致"
    source: 验收场景
    status: passed
  - item: "失败时先 release-state，再同帧回退 legacy popup"
    source: 流程级约束
    status: passed
  - item: "FLAG_RELEASE 广播纪律不因 popup migration 被破坏"
    source: 流程级约束
    status: passed
  - item: "栖梦设置页仍只保留全局 qm_rmlui_enable 图形化开关"
    source: 范围守护
    status: passed
  - item: "非迁移 popup 和 popup_menu 继续完整走 legacy 路径"
    source: 验收场景
    status: passed
